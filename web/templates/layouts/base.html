<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Shrike{{end}} — Free WHOIS History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mask:    '#1A1A1E',
                        slate:   '#6B7B8D',
                        ash:     '#9EAAB6',
                        breast:  '#F0EDE8',
                        buff:    '#C8B9A4',
                        wingbar: '#D8D4CE',
                        beak:    '#2C2C30',
                        eye:     '#0F0F12',
                        steel:   '#4A7FA5',
                        sage:    '#5E8A6B',
                        amber:   '#B08840',
                        rust:    '#A04040',
                        surface: {
                            950: '#0C0C0F',
                            900: '#141418',
                            800: '#1E1E24',
                            700: '#2A2A32',
                            600: '#3A3A44',
                        },
                        muted: '#6B7B8D',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        [hx-indicator] .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
    </style>
    {{block "head" .}}{{end}}
</head>
<body class="bg-surface-950 text-breast min-h-screen">
    {{template "header" .}}
    <main class="max-w-5xl mx-auto px-4 py-8">
        {{block "content" .}}{{end}}
    </main>
    {{template "footer" .}}
    {{block "scripts" .}}{{end}}
</body>
</html>
